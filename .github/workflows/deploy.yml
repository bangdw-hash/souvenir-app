name: Deploy to Firebase Hosting

on:
  push:
    branches: [claude/family-health-hub-S34bb, main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env file
        run: |
          echo "VITE_FIREBASE_API_KEY=AIzaSyCW2UL_p3_2BAY0WQy2gKLa30HPn15cxaU" > .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=family-health-hub-60b41.firebaseapp.com" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=family-health-hub-60b41" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=family-health-hub-60b41.firebasestorage.app" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=1034822906211" >> .env
          echo "VITE_FIREBASE_APP_ID=1:1034822906211:web:c0fc89c166209178fae356" >> .env

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: family-health-hub-60b41

      - name: Deploy Firebase Storage
        continue-on-error: true
        run: |
          npm install -g firebase-tools
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          gsutil mb -p family-health-hub-60b41 -l us-central1 gs://family-health-hub-60b41.firebasestorage.app 2>/dev/null || true
          printf '[{"origin":["*"],"method":["GET","HEAD","PUT","POST","DELETE"],"responseHeader":["Content-Type","Content-Disposition","Origin","Accept","Authorization"],"maxAgeSeconds":3600}]' > /tmp/cors.json
          gsutil cors set /tmp/cors.json gs://family-health-hub-60b41.firebasestorage.app 2>/dev/null || true
          firebase deploy --only storage --project family-health-hub-60b41 2>/dev/null || true
          rm -f /tmp/sa.json /tmp/cors.json
