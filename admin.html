<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지 - 기념품 불출 대장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

  <div class="header admin-header">
    <h1>⚙️ 관리자 페이지</h1>
    <p>기념품 재고 관리</p>
  </div>

  <div id="adminAlert" class="alert"></div>

  <!-- 로그인 -->
  <div id="loginSection" class="card">
    <div class="card-title">관리자 인증</div>
    <div class="password-gate">
      <label for="passwordInput">비밀번호를 입력하세요</label>
      <input type="password" id="passwordInput" placeholder="관리자 비밀번호" style="max-width:280px;margin:10px auto 0;display:block;">
      <button class="btn-primary" id="loginBtn" style="margin-top:12px;">확인</button>
    </div>
  </div>

  <!-- 관리 섹션 -->
  <div id="adminSection" style="display:none;">

    <!-- 탭 메뉴 -->
    <div class="tab-wrap">
      <button class="tab-btn tab-active" id="tabItems" onclick="switchTab('items')">📦 물품 관리</button>
      <button class="tab-btn" id="tabDepts" onclick="switchTab('depts')">🏢 소속 관리</button>
    </div>

    <!-- 물품 관리 섹션 -->
    <div id="sectionItems">
      <div class="card">
        <div class="card-title">
          <span>재고 현황 및 물품 관리</span>
          <button class="btn-primary" onclick="openAddModal()" style="padding:6px 14px;font-size:0.8rem;">+ 물품 추가</button>
        </div>
        <div id="adminItemList"></div>
      </div>
    </div>

    <!-- 소속 관리 섹션 -->
    <div id="sectionDepts" style="display:none;">
      <div class="card">
        <div class="card-title">
          <span>소속 목록 관리</span>
          <button class="btn-primary" onclick="openAddDeptModal()" style="padding:6px 14px;font-size:0.8rem;">+ 소속 추가</button>
        </div>
        <p style="font-size:0.78rem;color:#718096;margin-bottom:12px;">▲▼ 버튼으로 순서를 변경할 수 있습니다. 변경 즉시 신청 폼에 반영됩니다.</p>
        <div id="deptList"></div>
      </div>
    </div>

    <div style="text-align:center;margin-top:8px;">
      <a href="index.html" style="font-size:0.82rem;color:#718096;text-decoration:none;">← 신청 폼으로 돌아가기</a>
    </div>

  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <h3 id="modalTitle">물품 추가</h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
